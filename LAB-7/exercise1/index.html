<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Notes Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Student Notes Manager</h1>
            <p>Manage your study notes with CRUD operations</p>
        </header>

        <!-- Add Note Section -->
        <section class="add-note-section">
            <h2>Add New Note</h2>
            <form id="noteForm">
                <div class="form-group">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" placeholder="e.g., MongoDB Basics" required>
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject" placeholder="e.g., Database" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="4" placeholder="e.g., Introduction to MongoDB concepts" required></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Add Note</button>
            </form>
        </section>

        <!-- View Notes Section -->
        <section class="view-notes-section">
            <div class="section-header">
                <h2>My Notes</h2>
                <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh</button>
            </div>
            
            <div id="notesContainer" class="notes-container">
                <!-- Notes will be dynamically loaded here -->
                <p class="loading">Loading notes...</p>
            </div>
        </section>

        <!-- Edit Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Edit Note</h2>
                    <span class="close">&times;</span>
                </div>
                <form id="editForm">
                    <input type="hidden" id="editNoteId">
                    
                    <div class="form-group">
                        <label for="editTitle">Title:</label>
                        <input type="text" id="editTitle" name="title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editSubject">Subject:</label>
                        <input type="text" id="editSubject" name="subject" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editDescription">Description:</label>
                        <textarea id="editDescription" name="description" rows="4" required></textarea>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="submit" class="btn btn-primary">Update Note</button>
                        <button type="button" class="btn btn-secondary cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div id="deleteModal" class="modal">
            <div class="modal-content modal-small">
                <div class="modal-header">
                    <h2>Confirm Delete</h2>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this note?</p>
                    <p class="delete-note-title"></p>
                </div>
                <div class="modal-actions">
                    <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
                    <button class="btn btn-secondary cancel-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
